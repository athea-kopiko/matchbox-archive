<meta charset="utf-8" />

<title>2008 – Matchbox Superfast Archive</title>

<style>
  :root{
    --bg:#f4efe5;
    --line:rgba(0,0,0,.18);
    --text:rgba(0,0,0,.85);
    --muted:rgba(0,0,0,.55);
    --panel:rgba(255,255,255,.18);
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Georgia,"Times New Roman",serif;
  }

  .wrap{
    width:min(1200px,92vw);
    margin:40px auto 70px;
  }

  h1{
    margin:0 0 8px;
    text-align:center;
    font-weight:normal;
    letter-spacing:.06em;
    text-transform:uppercase;
  }

  .sub{
    text-align:center;
    color:var(--muted);
    margin:0 0 26px;
    font-size:14px;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .topbar{
    display:flex;
    justify-content:center;
    margin:18px 0 26px;
  }

  .back{
    text-decoration:none;
    color:var(--text);
    border:1px solid var(--line);
    background:var(--panel);
    padding:8px 14px;
    border-radius:999px;
    font-variant:small-caps;
    letter-spacing:.06em;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap:18px;
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:rgba(255,255,255,.10);
  }

  .card{
    display:block;
    padding:14px;
  }

  .thumb{
    width:100%;
    border-radius:10px;
    display:block;
    background:#fff;
  }
  
  .cap{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
  letter-spacing:.03em;
  text-align:center;
}

  /* 📱 mobil – cca 3 vedle sebe */
  @media (max-width: 720px){
    .grid{
      grid-template-columns: repeat(3, 1fr);
    }
  }
</style>
</head>
