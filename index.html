<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matchbox Superfast Archive</title>

  <style>
    :root{
      --bg: #f4efe5;
      --panel: #efe7da;
      --line: rgba(0,0,0,.18);
      --text: rgba(0,0,0,.85);
      --muted: rgba(0,0,0,.55);
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .wrap{
      width: min(1200px, 92vw);
      margin: 0 auto;
      padding: 22px 0 50px;
    }

.hero{
  width: 100%;
  max-width: 1200px;
  height: auto;
  display: block;
  margin: 0 auto;
  border-radius: 12px;
}
  
    .nav-wrap{
      width: min(860px, 92vw);
      margin: 16px auto 0;
      position: relative;
      padding-top: 28px;
    }

    .info-pill{
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,.20);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 18px;
      text-decoration: none;
      color: var(--muted);
      letter-spacing: .06em;
      font-variant: small-caps;
    }

    .year-grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,.20);
    }

    .year-card{
      display: grid;
      place-items: center;
      padding: 22px 10px 20px;
      text-decoration: none;
      color: var(--text);
      text-align: center;
    }

    .year-card + .year-card{
      border-left: 1px solid var(--line);
    }

    .year-title{
      font-size: 34px;
      letter-spacing: .02em;
      line-height: 1.05;
    }

    .year-title .muted{
      font-size: .72em;
      color: var(--muted);
      letter-spacing: .08em;
      margin-left: 6px;
    }

    .year-sub{ display:none; }

    .foot{
      margin:60px 0 0;
      text-align:right;
      font-size:13px;
      letter-spacing:.08em;
      color:var(--muted);
    }

    @media (max-width: 650px){
      .year-grid{ grid-template-columns: 1fr; }
      .year-card + .year-card{
        border-left: none;
        border-top: 1px solid var(--line);
      }
    }

    /* menší výška okna (notebooky) – zhuštění rozestupů */
    @media (max-height: 780px){
      .wrap{ padding: 12px 0 40px; }
      .nav-wrap{ margin-top: 14px; padding-top: 22px; }
      .year-card{ padding: 16px 10px 14px; }
      .foot{ margin-top: 36px; }
    }

    @media (max-height: 700px){
        .hero{
    max-height: 62vh;
    width: auto;
    max-width: 100%;
    height: auto;
      .wrap{ padding: 10px 0 32px; }
      .nav-wrap{ margin-top: 10px; padding-top: 18px; }
      .year-title{ font-size: 30px; }
      .foot{ margin-top: 28px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <img class="hero" src="homepage.jpg" alt="Matchbox Superfast Archive" />

    <div class="nav-wrap">
      <a class="info-pill" href="info.html">INFO</a>

      <div class="year-grid">
        <a class="year-card" href="2005-usa.html">
          <div class="year-title">2005 <span class="muted">USA</span></div>
        </a>

        <a class="year-card" href="2005-row.html">
          <div class="year-title">2005 <span class="muted">ROW</span></div>
        </a>
      </div>
    </div>

    <footer class="foot">© Kopiko</footer>
  </div>

  <script data-goatcounter="https://kopiko.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
