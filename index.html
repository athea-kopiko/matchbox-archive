<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matchbox Superfast Archive</title>

  <style>
    :root{
      --bg: #f4efe5;
      --line: rgba(0,0,0,.18);
      --text: rgba(0,0,0,.85);
      --muted: rgba(0,0,0,.55);
      --pill-bg: rgba(255,255,255,.18);
    }

    *{
      box-sizing: border-box;
    }

    body{
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .wrap{
      width: min(1200px, 92vw);
      margin: 0 auto;
      padding: 22px 0 50px;
    }

    .hero{
      width: 100%;
      max-width: 1200px;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
    }

    .nav-wrap{
      width: min(860px, 92vw);
      margin: 22px auto 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .year-list{
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:12px;
    }

    .year-pill{
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--pill-bg);
      text-decoration: none;
      color: var(--text);
      text-align: center;
      transition: background .15s ease, transform .15s ease;
    }

    .year-pill:hover{
      background: rgba(255,255,255,.26);
      transform: translateY(-1px);
    }

    .section-divider{
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 4px 0;
      color: var(--muted);
    }

    .section-divider::before,
    .section-divider::after{
      content: "";
      flex: 1;
      border-top: 1px solid var(--line);
    }

    .section-pill{
      min-width: 120px;
      padding: 7px 20px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--bg);
      color: var(--muted);
      text-align: center;
      font-size: 15px;
      letter-spacing: .08em;
      font-variant: small-caps;
      text-decoration: none;
    }

    .info-link{
      background: var(--pill-bg);
      color: var(--text);
    }

    .year-title{
      font-size: 17px;
      letter-spacing: .02em;
      line-height: 1.05;
      white-space: nowrap;
    }

    .year-title .muted{
      font-size: .72em;
      color: var(--muted);
      letter-spacing: .08em;
      margin-left: 6px;
    }

    .foot{
      margin: 60px 0 0;
      text-align: right;
      font-size: 13px;
      letter-spacing: .08em;
      color: var(--muted);
    }

    @media (max-width:900px){
      .year-list{
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width:650px){
      .year-list{
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .year-pill{
        min-height:52px;
        padding: 8px;
      }

      .year-title{
        font-size: 18px;
      }
    }
  </style>
</head>
