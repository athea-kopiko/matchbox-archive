<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matchbox Superfast Archive</title>

  <style>
    :root{
      --bg: #f4efe5;
      --line: rgba(0,0,0,.18);
      --text: rgba(0,0,0,.85);
      --muted: rgba(0,0,0,.55);
      --pill-bg: rgba(255,255,255,.18);
    }

    *{
      box-sizing: border-box;
    }

    body{
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .wrap{
      width: min(1200px, 92vw);
      margin: 0 auto;
      padding: 22px 0 50px;
    }

    .hero{
      width: 100%;
      max-width: 1200px;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
    }

    .nav-wrap{
      width: min(860px, 92vw);
      margin: 22px auto 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .info-pill{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 7px 20px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--bg);
      text-decoration: none;
      color: var(--muted);
      font-size: 15px;
      letter-spacing: .08em;
      font-variant: small-caps;
    }

    .year-list{
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 18px;
    }

    .year-pill{
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--pill-bg);
      text-decoration: none;
      color: var(--text);
      text-align: center;
      transition: background .15s ease, transform .15s ease;
    }

    .year-pill:hover{
      background: rgba(255,255,255,.26);
      transform: translateY(-1px);
    }

    .year-title{
      font-size: 34px;
      letter-spacing: .02em;
      line-height: 1.05;
      white-space: nowrap;
    }

    .year-title .muted{
      font-size: .72em;
      color: var(--muted);
      letter-spacing: .08em;
      margin-left: 6px;
    }

    .foot{
      margin: 60px 0 0;
      text-align: right;
      font-size: 13px;
      letter-spacing: .08em;
      color: var(--muted);
    }

    @media (max-width: 650px){
      .year-list{
        grid-template-columns: 1fr;
      }

      .year-pill{
        min-height: 84px;
        padding: 18px 16px;
      }

      .year-title{
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <img class="hero" src="homepage.jpg" alt="Matchbox Superfast Archive" />

    <div class="nav-wrap">

      <a class="info-pill" href="info.html">INFO</a>

      <div class="year-list">
        <a class="year-pill" href="2005-usa.html">
          <div class="year-title">2005 <span class="muted">USA</span></div>
        </a>

        <a class="year-pill" href="2005-row.html">
          <div class="year-title">2005 <span class="muted">ROW</span></div>
        </a>

        <a class="year-pill" href="2006-superfast.html">
          <div class="year-title">2006</div>
        </a>

        <a class="year-pill" href="2007-superfast.html">
          <div class="year-title">
    2007
    <span class="muted">AMERICA</span>
</div>
        </a>
      </div>

    </div>

    <footer class="foot">© Kopiko</footer>

  </div>

  <script data-goatcounter="https://kopiko.goatcounter.com/count"
          async
          src="//gc.zgo.at/count.js"></script>

</body>
</html>
